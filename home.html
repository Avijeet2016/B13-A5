<body class="bg-[#F8FAFC]">
    <!-- header navbar  -->
    <header class="bg-[#FFFFFF] w-full px-4 sm:px-20 mx-auto py-4 shadow-xs flex flex-col sm:flex-row justify-between items-center">
        <div class="flex justify-start items-center gap-2 sm:gap-1">
            <img src="./assets/github-logo.png" alt="Github" class="h-9">
            <h2 class="font-bold">GitHub Issues Tracker</h2>
        </div>
        <div class="flex flex-col sm:flex-row items-stretch sm:items-center w-full gap-4 sm:w-auto">
            <label class="input w-full sm:w-auto rounded-md">
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
                >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
                </g>
            </svg>
            <input type="search" id="input-search" required placeholder="Search issues..." class="w-full "/>
            </label>
            <button class="bg-[#4A00FF] text-white whitespace-nowrap px-4 py-2 rounded-md active"><i class="fa-solid fa-plus"></i> New Issue</button>
        </div>
    </header>
    <!-- toggle buttons  -->
    <section id="toggle-btn" class="w-full max-w-[1110px] mx-auto mt-5 sm:mt-15">
        <div class="bg-[#FFFFFF] space-x-2 px-2 sm:px-6 py-2 sm:py-4 mb-4 flex justify-center items-center sm:justify-start rounded-md shadow-xs">
            <button id="all-btn" class="btn bg-white text-[#64748B] border-2 border-gray-300 px-2 sm:px-10 py-2 rounded-md active">All</button>
            <button id="open-btn" class="btn bg-white text-[#64748B] border-2 border-gray-300 px-2 sm:px-10 py-2 rounded-md">Open</button>
            <button id="closed-btn" class="btn bg-white text-[#64748B] border-2 border-gray-300 px-2 sm:px-10 py-2 rounded-md">Closed</button>
        </div>
    </section>
    <!-- main section  -->
    <main class="w-full max-w-[1110px] mx-auto mt-4 ">
        <!-- Total Issues  -->
        <section id="issues-container" class="bg-[#FFFFFF] py-5 rounded-t-md shadow-lg border-b-2 border-gray-200">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3 px-4">
                    <img src="./assets/Aperture.png" alt="Aperture" class="rounded-full bg-[#ECE4FF] p-2 w-10 h-10">
                    <div class="flex flex-col flex-wrap">
                        <h2 class="font-bold text-xl"><span id="total-issue">50</span> Issues</h2>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex justify-center items-center gap-2 px-4">
                    <div class="w-3 h-3 bg-[#00A96E] rounded-full"></div><span>Open</span>
                    <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div><span>Closed</span>
                </div>
            </div>
        </section>
        <!-- Card Container  -->
        <section id="card-container" class="bg-[#FBFBFB] grid grid-cols-1 sm:grid-cols-4 sm:gap-3 p-6 shadow-md rounded-b-md"> 
            <div class="flex justify-center items-center col-span-full">
                <span id="spinner" class="loading loading-bars loading-lg hidden"></span>
