<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Login</title>
    
    <!-- tailwind and daisyui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- icons  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- stylesheet -->
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-[#F8FAFC]">
    <div class="bg-[#FFFFFF] w-full sm:max-w-[520px] mx-auto shadow-md rounded-md max-h-screen p-8 mt-5 space-y-6">
        <div class="flex flex-col gap-2 text-center mb-4">
            <img src="./assets/github-logo.png" alt="Github" class="h-auto w-30 mx-auto">
            <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <div> 
            <form class="flex flex-col gap-1 text-start">
                <label for="username" name="username" class="font-bold">Username</label>
                <input id="username" type="text" placeholder="Enter Username" class="text-[#64748B] border border-gray-300 px-4 py-2 rounded-md">
                <span class="text-sm text-[#4900FC]">Default: admin</span>
                <label for="password" name="password" class="font-bold">Password</label>
                <input id="password" type="password" placeholder="Enter Password" class="text-[#64748B] border border-gray-300 px-4 py-2 rounded-md">
                <span class="text-sm text-[#4900FC] mb-3">Default: admin123</span>
                <button type="button" id="signIn-btn" class="bg-[#4A00FF] text-white w-full px-4 py-2 rounded-md">Sign In</button>
            </form>
        </div>
        <div class="flex justify-center items-center gap-3">
            <hr class="flex-grow border-gray-300">
            <span class="text-gray-500 text-sm">OR</span>
            <hr class="flex-grow border-gray-300">
        </div>
        <div class="flex flex-col gap-3 text-center">
            <p class="text-[#64748B]">Demo Credentials:</p>
            <div class="bg-gray-100 py-5 rounded-md shadow-sm text-[#1F2937]">
                <h3 class="font-bold">Username: <span class="font-normal">admin</span></h3>
                <h3 class="font-bold">Password: <span class="font-normal">admin123</span></h3>
            </div>
        </div>
    </div>

    <!-- script integration  -->
    <script src="./script/login.js"></script>
</body>
</html>
